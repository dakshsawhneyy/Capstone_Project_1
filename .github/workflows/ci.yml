name: CI Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Cache npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('app/frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies in Frontend
        working-directory: app/frontend
        run: npm install

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        working-directory: app/frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/capstone_frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/capstone_frontend:latest
      
      - name: Build and Push Backend Image
        working-directory: app/backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/capstone_backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/capstone_backend:latest
