name: CI Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        working-directory: app/frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/capstone_frontend:v1 .
          docker push ${{ secrets.DOCKER_USERNAME }}/capstone_frontend:v1
      
      - name: Build and Push Backend Image
        working-directory: app/backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/capstone_backend:v1 .
          docker push ${{ secrets.DOCKER_USERNAME }}/capstone_backend:v1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3
        with:
          terraform-version: "1.18.0"
          terraform_wrapper: false

      - name: Configure AWS Creadentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply --auto-approve

