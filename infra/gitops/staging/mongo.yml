apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: capstone-stg
  labels:
    app: mongo
spec:
  serviceName: mongo        # must match the Headless Service name below
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        storageClassName: gp2
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: capstone-stg
spec:
  clusterIP: None           # headless — StatefulSet requirement
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017