apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: capstone-dev
  labels:
    app: frontend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dakshsawhneyy/capstone_frontend:520143b39907fc6a7696e5ccfe446b99d032cba8
          ports:
            - containerPort: 80

---
# LoadBalancer — exposes frontend to the outside world (browser access)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: capstone-dev
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
