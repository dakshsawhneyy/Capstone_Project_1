apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: capstone-dev
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dakshsawhneyy/capstone_backend:396ed2da9f871e51fbdf9823354f12c924fdea26
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_URL
              value: "mongodb://mongo:27017/dd_db"

---
# ClusterIP — backend is internal only, only reachable by frontend via Nginx proxy
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: capstone-dev
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
