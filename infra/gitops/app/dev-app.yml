apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dakshsawhneyy/Capstone_Project_1.git'
    targetRevision: HEAD
    path: infra/gitops/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: capstone-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true